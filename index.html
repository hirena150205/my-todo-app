<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
  </head>
  <body>
    <div class="container">
      <h1>My To-Do Task Board</h1>
      <div class="input-form">
        <input type="text" id="taskTitle" placeholder="何をする？" />
        <input type="date" id="taskDeadline" />
        <select id="taskImportance">
          <option value="3">最重要</option>
          <option value="2">重要</option>
          <option value="1">通常</option>
        </select>

        <div style="display: flex; gap: 8px; flex-grow: 1; min-width: 150px">
          <select id="taskCategory"></select>
        </div>
        <button onclick="addTask()">追加</button>
      </div>

      <div id="categoryFilter" class="category-filter"></div>

      <div id="board">
        <section class="deadline-row" data-deadline="today">
          <h2>本日</h2>
          <div class="task-list"></div>
        </section>
        <section class="deadline-row" data-deadline="tomorrow">
          <h2>翌日</h2>
          <div class="task-list"></div>
        </section>
        <section class="deadline-row" data-deadline="week">
          <h2>1週間以内</h2>
          <div class="task-list"></div>
        </section>
        <section class="deadline-row" data-deadline="later">
          <h2>1週間以上</h2>
          <div class="task-list"></div>
        </section>
      </div>
    </div>
    <button
      id="openDoneList"
      class="done-toggle-btn"
      onclick="toggleDrawer(true)"
    >
      Done リストを表示
    </button>

    <div id="doneDrawer" class="done-drawer">
      <div
        class="drawer-header"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <h3 style="margin: 0">完了済み</h3>
        <div>
          <button
            onclick="clearAllDoneTasks()"
            style="
              background: none;
              border: none;
              color: #ef4444;
              font-size: 0.8rem;
              cursor: pointer;
              margin-right: 10px;
            "
          >
            全件消去
          </button>
          <button
            onclick="toggleDrawer(false)"
            style="
              background: none;
              border: none;
              color: white;
              font-size: 1.5rem;
              padding: 0;
              cursor: pointer;
            "
          >
            ×
          </button>
        </div>
      </div>
      <div id="doneTaskList" class="done-task-list"></div>
    </div>

    <div
      id="overlay"
      class="overlay"
      onclick="
        toggleDrawer(false);
        toggleCategoryDrawer(false);
      "
    ></div>

    <div id="categoryDrawer" class="done-drawer">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <h3 style="margin: 0">カテゴリ管理</h3>
        <button
          onclick="toggleCategoryDrawer(false)"
          style="
            background: none;
            border: none;
            font-size: 1.5rem;
            padding: 0;
            color: white;
          "
        >
          ×
        </button>
      </div>

      <div style="display: flex; gap: 8px; margin-bottom: 20px">
        <input
          type="text"
          id="newCategoryInput"
          placeholder="新しいカテゴリ"
          style="flex-grow: 1; height: 40px"
        />
        <button
          onclick="addCategoryFromDrawer()"
          style="padding: 0 15px; height: 40px"
        >
          追加
        </button>
      </div>

      <div
        id="categoryManageList"
        style="display: flex; flex-direction: column; gap: 8px"
      ></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
